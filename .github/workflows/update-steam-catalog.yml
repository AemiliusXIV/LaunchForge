name: Update Steam catalog

# Refreshes docs/data/steam-apps.json from Valve's catalog on a weekly schedule.
on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays, 06:00 UTC
  workflow_dispatch:        # manual trigger from the Actions tab

permissions:
  contents: write

concurrency:
  group: steam-catalog
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch catalog
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: node docs/tools/fetch-steam-apps.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain docs/data/steam-apps.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/data/steam-apps.json
            git commit -m "Refresh Steam catalog"
            git push
          else
            echo "Catalog unchanged, nothing to commit."
          fi
